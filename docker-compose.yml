version: '3.8'

services:
  ranktica-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: gcr.io/ranktica-production/gateway:v3.0.0
    container_name: ranktica-gateway-node
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://ranktica-redis-cache:6379/0
    restart: always
    depends_on:
      - ranktica-redis-cache
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ranktica-redis-cache:
    image: redis:7-alpine
    container_name: ranktica-redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data_volume:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

volumes:
  redis_data_volume:
    driver: local
